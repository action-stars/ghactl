name: Release

on:
  push:
    tags:
      - v*

concurrency:
  group: release
  cancel-in-progress: false

permissions: read-all

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      attestations: write
      contents: write
      id-token: write
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache: false

      - name: Install Syft
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          syft-version: latest

      - name: Setup Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Run GoReleaser
        id: goreleaser
        uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          args: release --clean

      - name: Get build metadata
        id: metadata
        env:
          INPUT_METADATA: ${{ steps.goreleaser.outputs.metadata }}
          INPUT_ARTIFACTS: ${{ steps.goreleaser.outputs.artifacts }}
        run: |
          set -euo pipefail

          project_name="$(jq --raw-output '.project_name' <<<"${INPUT_METADATA}")"
          version="$(jq --raw-output '.version' <<<"${INPUT_METADATA}")"

          output_dir="$(jq --raw-output '.[] | select(.type == "Metadata").path | split("/")[:-1] | join("/")' <<<"${INPUT_ARTIFACTS}")"
          checksums="$(jq --raw-output '.[] | select(.type == "Checksum").path' <<<"${INPUT_ARTIFACTS}")"

          {
            echo "name=${project_name}"
            echo "version=${version}"
            echo "output_dir=${output_dir}"
            echo "checksums=${checksums}"
          } >> "${GITHUB_OUTPUT}"

      - name: Attest artifacts
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4.2.0
        with:
          subject-checksums: ${{ steps.metadata.outputs.checksums }}
