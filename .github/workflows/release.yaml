name: Release

on:
  push:
    tags:
      - v*

concurrency:
  group: release
  cancel-in-progress: false

permissions: read-all

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      attestations: write
      contents: write
      id-token: write
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: false

      - name: Install Syft
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          syft-version: latest

      - name: Setup Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Run GoReleaser
        id: goreleaser
        uses: goreleaser/goreleaser-action@1a80836c5c9d9e5755a25cb59ec6f45a3b5f41a8 # v7.2.1
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          args: release --clean

      - name: Get build metadata
        id: metadata
        env:
          INPUT_METADATA: ${{ steps.goreleaser.outputs.metadata }}
          INPUT_ARTIFACTS: ${{ steps.goreleaser.outputs.artifacts }}
        run: |
          set -euo pipefail

          project_name="$(jq --raw-output '.project_name' <<<"${INPUT_METADATA}")"
          version="$(jq --raw-output '.version' <<<"${INPUT_METADATA}")"

          output_dir="$(jq --raw-output '.[] | select(.type == "Metadata").path | split("/")[:-1] | join("/")' <<<"${INPUT_ARTIFACTS}")"
          checksums="$(jq --raw-output '.[] | select(.type == "Checksum").path' <<<"${INPUT_ARTIFACTS}")"

          {
            echo "name=${project_name}"
            echo "version=${version}"
            echo "output_dir=${output_dir}"
            echo "checksums=${checksums}"
          } >> "${GITHUB_OUTPUT}"

      - name: Attest artifacts
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-checksums: ${{ steps.metadata.outputs.checksums }}
