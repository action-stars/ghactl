name: Release

on:
  push:
    tags:
      - v*

concurrency:
  group: release
  cancel-in-progress: false

permissions: read-all

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      attestations: write
      contents: write
      id-token: write
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: false

      - name: Install Syft
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          syft-version: latest

      - name: Setup Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Run GoReleaser
        id: goreleaser
        uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # v7.2.2
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          args: release --clean

      - name: Get build metadata
        id: metadata
        env:
          INPUT_METADATA: ${{ steps.goreleaser.outputs.metadata }}
          INPUT_ARTIFACTS: ${{ steps.goreleaser.outputs.artifacts }}
        run: |
          set -euo pipefail

          project_name="$(jq --raw-output '.project_name' <<<"${INPUT_METADATA}")"
          version="$(jq --raw-output '.version' <<<"${INPUT_METADATA}")"

          output_dir="$(jq --raw-output '.[] | select(.type == "Metadata").path | split("/")[:-1] | join("/")' <<<"${INPUT_ARTIFACTS}")"
          checksums="$(jq --raw-output '.[] | select(.type == "Checksum").path' <<<"${INPUT_ARTIFACTS}")"

          {
            echo "name=${project_name}"
            echo "version=${version}"
            echo "output_dir=${output_dir}"
            echo "checksums=${checksums}"
          } >> "${GITHUB_OUTPUT}"

      - name: Attest artifacts
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-checksums: ${{ steps.metadata.outputs.checksums }}
