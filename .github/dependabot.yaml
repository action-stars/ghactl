version: 2

updates:
  - package-ecosystem: github-actions
    directories:
      - /
    groups:
      github-actions:
        applies-to: version-updates
        patterns:
          - "*"
        update-types:
          - minor
          - patch
      github-actions-security:
        applies-to: security-updates
        patterns:
          - "*"
        update-types:
          - minor
          - patch
    commit-message:
      prefix: deps
    labels:
      - dependency
      - dependency/github-actions
    schedule:
      interval: weekly

  - package-ecosystem: gomod
    directories:
      - /
    groups:
      gomod:
        applies-to: version-updates
        patterns:
          - "*"
        update-types:
          - minor
          - patch
      gomod-security:
        applies-to: security-updates
        patterns:
          - "*"
        update-types:
          - minor
          - patch
    commit-message:
      prefix: deps
    labels:
      - dependency
      - dependency/go
    schedule:
      interval: weekly
